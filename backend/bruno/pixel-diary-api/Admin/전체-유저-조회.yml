info:
  name: 전체-유저-조회
  type: http
  seq: 5

http:
  method: GET
  url: http://127.0.0.1:8000/api/v1/admin/users/?page_number=1&page_size=20
  headers:
    - name: Authorization
      value: "Bearer "
  params:
    - name: page_number
      value: "1"
      type: query
    - name: page_size
      value: "20"
      type: query
    - name: search_keyword
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Query Params, Params탭에 가셔서 확인하세요
  - page_number: 페이지 번호 (선택값 / 기본값 1)
  - page_size: 페이지당 유저 수 (선택값 / 기본값 20)
  - search_keyword: 유저명 검색어 (선택값)
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 유저 목록 조회 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 403 Forbidden: 관리자 권한 필요
