info:
  name: AddItem
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/admin/items/
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
          "item_name": "",
          "item_type": "",
          "item_price": ,
          "item_stackable": ,
          "item_info": "",
          "item_image_url": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
