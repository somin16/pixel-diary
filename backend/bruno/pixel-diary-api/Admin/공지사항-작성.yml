info:
  name: 공지사항-작성
  type: http
  seq: 2

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/admin/announcements/
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "title": "",
        "content": "",
        "category": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  ### Body / Json
  - title: 공지사항 제목
  - content: 공지사항 내용
  - category: 카테고리 (선택값 / 업데이트, 점검, 이벤트)
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 201 Created: 공지사항 작성 및 저장 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 acces_token)
  - 400 Bad Request: 필수값 누락 (title, content)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 403 Forbidden: access_token의 role이 admin이 아닌 경우
