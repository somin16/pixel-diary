info:
  name: 문제-유저-강제-탈퇴
  type: http
  seq: 6

http:
  method: DELETE
  url: http://127.0.0.1:8000/api/v1/admin/users/{id}/
  headers:
    - name: Authorization
      value: "Bearer "
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 유저 강제 탈퇴 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 403 Forbidden: 관리자 권한 필요
  - 404 Not Found: 해당 유저를 찾을 수 없는 경우
