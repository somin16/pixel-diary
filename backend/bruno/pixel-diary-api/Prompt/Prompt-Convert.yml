info:
  name: Prompt-Convert
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/prompt/convert
  body:
    type: json
    data: |-
      {
        "diary": "오늘은 비가와서 집에서 독서를 했다.\n창밖에는 하루종일 비가 왔다."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - diary: 변환할 일기 내용 (한국어 가능)
  ***
  ### Response
  - positive_prompt: ComfyUI 긍정 프롬프트
  - negative_prompt: ComfyUI 부정 프롬프트
  ***
  ### Status Code
  - 200 OK: 프롬프트 변환 성공
  - 400 Bad Request: diary 필드 누락
  - 500 Internal Server Error: Groq API 오류
