info:
  name: 아이템-구매
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/items/{item_id}/purchase/
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "item_count": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  {
    item_count: 구매할 아이템 수량 (기본값이 1이라 미리 입력해 두었습니다.)
  }
  ***
  ### Status Code
  - 201 Created: 아이템 구매 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 400 Bad Request: 유효성 검사 (item_count: 1 이상의 정수)
  - 400 Bad Request: 중복 구매 불가 (item_stackable이 false인 아이템)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 404 Not Found: 아이템을 찾을 수 없는 경우
