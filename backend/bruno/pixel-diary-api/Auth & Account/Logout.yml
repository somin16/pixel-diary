info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/auth/logout
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "refresh_token": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - refresh_token: 로그인할 시 받는 refresh_token
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 로그아웃 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 acces_token)
  - 400 Bad Request: 필수값 누락 (refresh_token )
