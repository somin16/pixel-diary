info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/auth/logout
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "refresh_token": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  refresh_token: 로그인할 시 받는 refresh_token
  Authorization: Bearer 로그인할 시 받는 access_token
