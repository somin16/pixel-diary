info:
  name: Reset-Password
  type: http
  seq: 10

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/auth/password/reset
  body:
    type: json
    data: |-
      {
        "user_email": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - user_email: "본인 이메일 주소"
  ***
  ### Status Code
  200 OK: 비밀번호 재설정 링크 이메일로 발송 성공
  400 Bad Request: 필수값 누락 (이메일)
  400 Bad Request: 이메일 형식 오류
  ***
  PR의 설명을 보고 테스트 해주시길 바랍니다.
