info:
  name: Change-Password
  type: http
  seq: 5

http:
  method: PATCH
  url: http://127.0.0.1:8000/api/v1/auth/password
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "current_password": "",
        "new_password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - current_password: 기존 비밀번호
  - new_password: 변경할 비밀번호
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 비밀번호 변경 성공
  - 400 BAD Request: 필수값 누락 (Authorization Bearer 헤더 acces_token)
  - 400 BAD Request: 필수값 누락 (현재 비밀번호와 새 비밀번호)
  - 400 BAD Request: 비밀번호 최소 길이 검증 (8자 미만)
  - 400 BAD Request: 현재 비밀번호가 같은 경우
  - 401 Unauthorized: 현재 비밀번호가 틀린 경우
