info:
  name: Change-Password
  type: http
  seq: 5

http:
  method: PATCH
  url: http://127.0.0.1:8000/api/v1/auth/password
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "current_password": "",
        "new_password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  current_password: 기존 비밀번호
  new_password: 변경할 비밀번호
  Authorization: Bearer 로그인할 시 받는 access_token
