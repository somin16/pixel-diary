info:
  name: Change-Username
  type: http
  seq: 7

http:
  method: PATCH
  url: http://127.0.0.1:8000/api/v1/auth/username/
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "user_name": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - user_name: 새로 변경할 닉네임
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 유저 이름 변경 성공
  - 400 BAD Request: 필수값 누락 (Authorization Bearer 헤더 acces_token)
  - 400 BAD Request: 필수값 누락 (user_name)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
