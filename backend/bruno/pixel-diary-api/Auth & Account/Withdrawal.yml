info:
  name: Withdrawal
  type: http
  seq: 6

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/auth/withdrawal
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - password: 회원 탈퇴할 계정의 비밀번호
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 회원 탈퇴 성공
  - 400 BAD Request: 필수값 누락 (Authorization Bearer 헤더 acces_token)
  - 400 BAD Request: 필수값 누락 (본인 확인 비밀번호)
  - 401 Unauthorized: 입력한 비밀번호가 일치하지 않을 경우
