info:
  name: 출석-기록-조회
  type: http
  seq: 3

http:
  method: GET
  url: http://127.0.0.1:8000/api/v1/profile/attendance/
  headers:
    - name: Authorization
      value: "Bearer "
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 출석 기록 조회 성공 (출석 기록이 없으면 빈 배열 반환)
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
