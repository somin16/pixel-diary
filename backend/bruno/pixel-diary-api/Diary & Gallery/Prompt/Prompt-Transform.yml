info:
  name: Prompt-Transform
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/prompt/transform
  body:
    type: json
    data: |-
      {
        "llm_model_engine_type": "",
        "diary": "",
        "gender": "",
        "age": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - llm_model_engine_type: groq/local/cerebras (3개중 하나 필수)
  - "groq" = Groq (llama-3.3-70b-versatile), "local" = Ollama 로컬 (qwen2.5:7b), "cerebras" = Cerebras (qwen-3-235b-a22b-instruct-2507)
  - diary: 변환할 일기 내용 (한국어로 입력해 주세요)(필수)
  - gender: 주인공 성별 (girl / man / boy / woman 등)(선택)
  - age: 주인공 나이 (선택)
  - 풍경중심의 프롬프트 생성을 원할경우 gender와 age모두 생략해야 합니다
  ***
  ### Response
  - positive_prompt: ComfyUI 긍정 프롬프트에 추가해 주세요
  - negative_prompt: ComfyUI 부정 프롬프트에 추가해 주세요
  ***
  ### Status Code
  - 200 OK: 프롬프트 변환 성공
  - 400 Bad Request: llm_model_engine_type 값 누락
  - 400 Bad Request: llm_model_engine_type 값이 유효하지 않음 (groq, local, cerebras 중 하나여야 함)
  - 400 Bad Request: diary 값 누락
  - 400 Bad Request: age 값이 유효하지 않음 (1 이상의 정수여야 함)
  - 400 Bad Requset: gender와 age는 둘 다 입력하거나 둘 다 생략해야함
  - 429 Too Many Requests: Cerebras 트래픽 과부하 (잠시 후 재시도)
  - 500 Internal Server Error: LLM API 오류 또는 서버 내부 오류

