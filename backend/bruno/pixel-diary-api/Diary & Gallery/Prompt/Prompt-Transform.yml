info:
  name: Prompt-Transform
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/prompt/transform
  body:
    type: json
    data: |-
      {
        "llm_model_engine_type": "groq",
        "diary": "",
        "gender": "",
        "age":
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - llm_model_engine_type: "groq" = Groq (기본값), "local" = Ollama 로컬 (qwen2.5:7b), "cerebras" = Cerebras (qwen-3-235b-a22b-instruct-2507)
  - diary: 변환할 일기 내용 (한국어로 입력해 주세요)
  - gender: 주인공 성별 (girl / man / boy / woman 등), 기본값: girl
  - age: 주인공 나이 (자연수), 기본값: 20
  ***
  ### Response
  - positive_prompt: ComfyUI 긍정 프롬프트에 추가해 주세요
  - negative_prompt: ComfyUI 부정 프롬프트에 추가해 주세요
  ***
  ### Status Code
  - 200 OK: 프롬프트 변환 성공
  - 400 Bad Request: diary 필드 누락
  - 500 Internal Server Error: LLM API 오류 또는 서버 내부 오류
