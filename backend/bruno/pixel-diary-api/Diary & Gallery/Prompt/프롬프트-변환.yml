info:
  name: 프롬프트-변환
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/prompt/transform
  body:
    type: json
    data: |-
      {
        "diary": "",
        "mode": "",
        "gender": "",
        "age": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - diary: 변환할 일기 내용 (한국어로 입력해 주세요)(필수)
  - mode: character / landscape (필수)
  - gender: 주인공 성별 (girl / man / boy / woman 등)(character 모드 시 필수)
  - age: 주인공 나이 (character 모드 시 필수)
  - landscape 모드에서는 gender와 age를 입력해도 무시됩니다
  ***
  ### Response
  - model: 사용된 LLM 모델명 (Qwen 고정)
  - positive_prompt: ComfyUI 긍정 프롬프트에 추가해 주세요
  - negative_prompt: ComfyUI 부정 프롬프트에 추가해 주세요
  ***
  ### Status Code
  - 200 OK: 프롬프트 변환 성공
  - 400 Bad Request: mode 값 누락
  - 400 Bad Request: mode 값이 유효하지 않음 (character, landscape 중 하나여야 함)
  - 400 Bad Request: character 모드에서 gender 또는 age 누락
  - 400 Bad Request: diary 값 누락
  - 400 Bad Request: age 값이 유효하지 않음 (1 이상의 정수여야 함)
  - 429 Too Many Requests: Cerebras 트래픽 과부하 (잠시 후 재시도)
