info:
  name: 프롬프트-변환
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/prompt/transform
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "diary": "",
        "request": "",
        "remove": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Headers
  - Authorization: Bearer <access_token> (필수 / POST /api/v1/auth/login/ 으로 발급)
  - users 테이블에 gender/age가 설정된 경우 → 인물 중심 프롬프트 자동 적용
  ***
  ### Body / Json
  - diary: 변환할 일기 내용 (한국어로 입력해 주세요)(필수)
  - request: 변환과 동시에 추가하거나 강조하고 싶은 내용 (한국어 가능)(선택)
  - remove: 변환과 동시에 제거하고 싶은 요소 (한국어 가능)(선택)
  ***
  ### LLM 모델
  - Groq Qwen (qwen/qwen3-32b) 고정 사용
  ***
  ### Response
  - model: 사용된 LLM 모델명
  - positive_prompt: ComfyUI 긍정 프롬프트에 추가해 주세요
  - negative_prompt: ComfyUI 부정 프롬프트에 추가해 주세요
  ***
  ### Status Code
  - 200 OK: 프롬프트 변환 성공
  - 400 Bad Request: 필수값 누락 (diary)
  - 400 Bad Request: users 테이블에 gender 또는 age 미설정
  - 401 Unauthorized: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 404 Not Found: 유저 정보를 찾을 수 없는 경우
  ***
  ### 프롬프트-수정과의 차이
  - request / remove를 여기서 함께 보내면 변환과 수정을 한 번에 처리
  - 변환 후 추가 수정이 필요한 경우 POST /api/v1/prompt/restyle 사용
