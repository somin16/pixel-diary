info:
  name: 일기-작성
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/diaries/
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "content": "",
        "image_id": null
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - content: 작성할 일기 내용 (필수)
  - image_id: AI 그림 생성 API에서 받은 image_id (선택, 없으면 null)
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 201 Created: 일기 작성 및 저장 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 400 Bad Request: 필수값 누락 (content)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 409 Conflict: 일기 중복 (백엔드에서 2차 방어)
