info:
  name: 임시-이미지-삭제
  type: http
  seq: 8

http:
  method: DELETE
  url: http://127.0.0.1:8000/api/v1/ai-generate/
  headers:
    - name: Authorization
      value: "Bearer "
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Headers
  - Authorization: Bearer 로그인 시 받은 access_token
  ***
  ### Status Code
  - 200 OK: 임시 이미지 삭제 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
