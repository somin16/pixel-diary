info:
  name: 프롬프트-변환
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/prompt/
  body:
    type: json
    data: |-
      {
        "diary": "",
        "request": "",
        "remove": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  ### Body / Json
  - diary: 변환할 일기 내용 (한국어로 입력해 주세요)(필수)
  - request: 변환과 동시에 추가하거나 강조하고 싶은 내용 (한국어 가능)(선택)
  - remove: 변환과 동시에 제거하고 싶은 요소 (한국어 가능)(선택)
  ***
  ### Status Code
  - 200 OK: 프롬프트 변환 성공
  - 400 Bad Request: 필수값 누락 (diary)
