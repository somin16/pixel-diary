info:
  name: EditDiary
  type: http
  seq: 2

http:
  method: PATCH
  url: http://127.0.0.1:8000/api/v1/diaries/{diary_id}
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "content": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### Body / Json
  - content: 수정할 일기 내용
  ***
  ### Headers
  - Authorization: Bearer 로그인할 시 받는 access_token
  ***
  ### Status Code
  - 200 OK: 일기 내용 수정 성공
  - 400 BAD Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 400 BAD Request: 필수값 누락 (content)
  - 400 BAD Request: 글자수 제한 (10자)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 404 Not_Found: 일기를 찾을 수 없거나 본인 일기가 아닌 경우
