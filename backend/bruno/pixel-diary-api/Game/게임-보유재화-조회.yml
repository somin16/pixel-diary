info:
  name: 게임-보유재화-조회
  type: http
  seq: 3

http:
  method: GET
  url: http://127.0.0.1:8000/api/v1/users/coins/
  headers:
    - name: Authorization
      value: "Bearer "
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Headers:
  - Authorization: Bearer 로그인할 시 받는 access_token

  Status Code:
  - 200 OK: 재화 조회 성공
  - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
  - 401 Unauthorized: 유효하지 않은 access_token인 경우
  - 404 Not Found: 유저 정보 없음
