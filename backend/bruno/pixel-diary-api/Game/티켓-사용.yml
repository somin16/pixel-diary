info:
  name: 티켓-사용
  type: http
  seq: 4

http:
  method: PATCH
  url: http://127.0.0.1:8000/api/v1/users/inventory/tickets/
  headers:
    - name: Authorization
      value: Bearer
  body:
    type: json
    data: |-
      {
          "item_id": 
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |+
  Headers:
  - Authorization: Bearer 로그인할 시 받는 access_token

  Status Code:
  - 200 OK: 티켓 사용 성공
  - 400 Bad Request: 필수값(item_id) 누락 또는 숫자 형식이 아님, 티켓 아이템이 아님, 보유한 티켓 없음
  - 401 Unauthorized: 토큰이 유효하지 않거나, 존재하지 않는 유저

