info:
  name: SaveGameScore
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/v1/games/1/scores/
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "game_score": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ### 참고 사항 
  기본값:0
  이유: game_score 값을 비운 채로 전송하면 JSON 형식이 올바르지 않아 서버가 데이터를 읽지 못해 JSON 형식이 깨지면서 파싱 오류가 발생합니다. 이 문제를 해결하기 위해 기본값을 0로 설정하여 값이 비어있어도 서버가 정상적으로 받을 수 있습니다.
  ### Body / Json
    - game_score: 저장할 게임 점수
    ***
    ### Headers
    - Authorization: Bearer 로그인할 시 받는 access_token
    ***
    ### Status Code
    - 201 Created: 게임 점수 저장 성공
    - 400 Bad Request: 필수값 누락 (Authorization Bearer 헤더 access_token)
    - 401 Unauthorized: 유효하지 않은 access_token인 경우
